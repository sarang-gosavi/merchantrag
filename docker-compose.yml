version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# MerchantRAG — Docker Compose
#
# Services:
#   api        — FastAPI + RAG engine (always required)
#   kafka      — Confluent Kafka broker (--profile kafka)
#   zookeeper  — Kafka dependency
#   kafdrop    — Kafka UI at http://localhost:9000
#   postgres   — pgvector local DB (--profile pgvector)
#
# Quick start (mock Kafka, sample data, local vectors):
#   docker-compose up api
#
# Full stack with Kafka:
#   docker-compose --profile kafka up
#
# With pgvector:
#   docker-compose --profile pgvector up
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── FastAPI application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_PROJECT=merchantrag
      - DEBUG=false
      - LOG_LEVEL=INFO
      - KAFKA_MOCK_MODE=true
      - USE_SAMPLE_DATA=true
      - USE_LOCAL_VECTORS=true
      - VECTOR_BACKEND=local
      - USE_LOCAL_DB=true
      - LOCAL_DB_PATH=/app/data/merchantrag.sqlite
      - CHUNK_SIZE=512
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - merchantrag

  # ── Kafka + Zookeeper (--profile kafka) ───────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    profiles: [kafka]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - merchantrag
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    profiles: [kafka]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_MS: 604800000
    networks:
      - merchantrag
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.2
    profiles: [kafka]
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
    depends_on:
      - kafka
    networks:
      - merchantrag

  # ── Kafka-connected API (--profile kafka) ─────────────────────────────────
  api-kafka:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [kafka]
    ports:
      - "8001:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - KAFKA_MOCK_MODE=false
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - USE_SAMPLE_DATA=true
      - USE_LOCAL_VECTORS=true
      - USE_LOCAL_DB=true
    depends_on:
      - kafka
    networks:
      - merchantrag

  # ── pgvector Postgres (--profile pgvector) ────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    profiles: [pgvector]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: merchantrag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - merchantrag
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s

volumes:
  pgvector_data:

networks:
  merchantrag:
    driver: bridge
